databases:
  - name: tour_hearing_hige_zentai_db
    databaseName: tour_hearing_hige_zentai_production
    user: tour_hearing_hige_zentai
    plan: basic-256mb

services:
  - type: web
    name: tour-hearing-hige-zentai
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tour_hearing_hige_zentai_db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
